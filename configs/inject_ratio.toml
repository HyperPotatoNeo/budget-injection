# Run 5: INJECT-RATIO — Ratio-based budget messages (percentage format)
# Tests H4: ratio signals should generalize across budget sizes.
# Requires adding {percent} and {remaining_percent} template vars to worker.py.

max_steps = 600
seq_len = 9216
output_dir = "outputs/inject-ratio"

[model]
name = "Qwen/Qwen3-4B"

[wandb]
project = "budget-injection"
name = "inject-ratio"

[ckpt]
interval = 25
resume_step = -1

[deployment]
num_train_gpus = 4
num_infer_gpus = 0

[trainer]
dist_timeout_seconds = 3600

[trainer.model]
impl = "auto"
optim_cpu_offload = true

[trainer.model.ac]
freq = 1

[trainer.optim]
lr = 1e-6
weight_decay = 0.01
betas1 = 0.9
betas2 = 0.9

[trainer.loss]
type = "default"

[orchestrator]
batch_size = 256
rollouts_per_example = 8

[orchestrator.client]
base_url = [
    "http://__INFERENCE_NODE__:8000/v1",
    "http://__INFERENCE_NODE__:8001/v1",
    "http://__INFERENCE_NODE__:8002/v1",
    "http://__INFERENCE_NODE__:8003/v1",
]

[orchestrator.sampling]
max_tokens = 8192

[[orchestrator.env]]
id = "compaction_env"
name = "inject-ratio"
args = { gym = "rg_mix_env", inject_only = true, inject_budget_every = 2048, max_total_tokens = 8192, max_seq_len = 9216, budget_message_template = "[{percent}% used] ~{remaining_percent}% budget remaining.", dataset_path = "/pscratch/sd/s/siddart2/datasets/rg_mix_7500", num_train_examples = 7500, num_eval_examples = 100 }
