# Run 9: INJECT-8B — Qwen3-8B with LoRA r=32, budget injection
# Tests whether budget injection benefit scales with model size.

max_steps = 400
seq_len = 9216
output_dir = "outputs/inject-8b"

[model]
name = "Qwen/Qwen3-8B"

[wandb]
project = "budget-injection"
name = "inject-8b-lora"

[ckpt]
interval = 25
resume_step = -1

[deployment]
num_train_gpus = 4
num_infer_gpus = 0

[trainer]
dist_timeout_seconds = 3600

[trainer.model]
impl = "auto"
optim_cpu_offload = true

[trainer.model.ac]
freq = 1

[trainer.model.lora]
rank = 32

[trainer.optim]
lr = 1e-5
weight_decay = 0.01
betas1 = 0.9
betas2 = 0.9

[trainer.loss]
type = "default"

[orchestrator]
batch_size = 128
rollouts_per_example = 8

[orchestrator.model.lora]
name = "r32-inject-8b"

[orchestrator.client]
base_url = [
    "http://__INFERENCE_NODE__:8000/v1",
    "http://__INFERENCE_NODE__:8001/v1",
    "http://__INFERENCE_NODE__:8002/v1",
    "http://__INFERENCE_NODE__:8003/v1",
]

[orchestrator.sampling]
max_tokens = 8192

[inference]
enable_lora = true
gpu_memory_utilization = 0.90

[[orchestrator.env]]
id = "compaction_env"
name = "inject-8b"
args = { gym = "rg_mix_env", inject_only = true, inject_budget_every = 2048, max_total_tokens = 8192, max_seq_len = 9216, dataset_path = "/pscratch/sd/s/siddart2/datasets/rg_mix_7500", num_train_examples = 7500, num_eval_examples = 100 }
