# Run 4: INJECT-4096 — Budget injection every 4096 tokens (low frequency)
# Tests H2. Run with 2 seeds.

max_steps = 400
seq_len = 9216
output_dir = "outputs/inject-4096"

[model]
name = "Qwen/Qwen3-4B"

[wandb]
project = "budget-injection"
name = "inject-4096"

[ckpt]
interval = 30
resume_step = -1

[deployment]
num_train_gpus = 2
num_infer_gpus = 2

[trainer]
dist_timeout_seconds = 3600

[trainer.model]
impl = "auto"
optim_cpu_offload = true

[trainer.model.ac]
freq = 1

[trainer.optim]
lr = 1e-6
weight_decay = 0.01
betas1 = 0.9
betas2 = 0.9

[trainer.loss]
type = "default"

[orchestrator]
batch_size = 256
rollouts_per_example = 4

[orchestrator.sampling]
max_tokens = 8192

[[orchestrator.env]]
id = "budget_injection_env"
name = "inject-4096"
args = { gym = "rg_mix_env", inject_budget_every = 4096, max_total_tokens = 8192, budget_message_template = "Budget: {used}/{total} tokens generated. ~{remaining} tokens remaining.", dataset_path = "/pscratch/sd/s/siddart2/datasets/rg_mix_7500", num_train_examples = 7500, num_eval_examples = 100 }
