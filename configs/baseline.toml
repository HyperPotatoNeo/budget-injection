# Run 1: BASELINE — Standard GRPO, no budget injection
# Already completed (step 600). Control for all comparisons.
# Rerun from: compaction-rl/configs/compaction/qwen3_4b_fullft_baseline.toml

max_steps = 600
seq_len = 9216
output_dir = "outputs/baseline"

[model]
name = "Qwen/Qwen3-4B"

[wandb]
project = "budget-injection"
name = "baseline"

[ckpt]
interval = 25
resume_step = -1

[deployment]
num_train_gpus = 4
num_infer_gpus = 0

[trainer]
dist_timeout_seconds = 3600

[trainer.model]
impl = "auto"
optim_cpu_offload = true

[trainer.model.ac]
freq = 1

[trainer.optim]
lr = 1e-6
weight_decay = 0.01
betas1 = 0.9
betas2 = 0.9

[trainer.loss]
type = "default"

[orchestrator]
batch_size = 256
rollouts_per_example = 8

[orchestrator.client]
base_url = [
    "http://__INFERENCE_NODE__:8000/v1",
    "http://__INFERENCE_NODE__:8001/v1",
    "http://__INFERENCE_NODE__:8002/v1",
    "http://__INFERENCE_NODE__:8003/v1",
]

[orchestrator.sampling]
max_tokens = 8192

[[orchestrator.env]]
id = "rg_mix_env"
name = "rg-mix-baseline"
args = { dataset_path = "/pscratch/sd/s/siddart2/datasets/rg_mix_7500", num_train_examples = 7500, num_eval_examples = 100 }
